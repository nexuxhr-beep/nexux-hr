m startups with 10 employees to enterprises with thousands. Whether you have a dedicated HR team or a founder wearing multiple hats, HRFlow simplifies HR management for everyone."},{q:"Is HRFlow available globally?",a:"Yes! HRFlow supports companies worldwide with multi-currency payroll, multi-language support, and compliance features for various regions. We're constantly expanding our global capabilities."},{q:"When is HRFlow launching?",a:"We're currently in our pre-launch phase. You can sign up for early access and be among the first to experience HRFlow when we launch. Early access members also get exclusive pricing benefits."}]},{category:"Pricing & Plans",faqs:[{q:"How much does HRFlow cost?",a:"HRFlow offers three plans: Starter ($29/user/mo), Business ($79/user/mo), and Enterprise ($199/user/mo). All plans come with a 14-day free trial. Annual billing saves you 17%."},{q:"Is there a free trial?",a:"Absolutely! Every plan includes a 14-day free trial with full access to all features. No credit card required to start your trial."},{q:"Can I change plans later?",a:"Yes, you can upgrade or downgrade your plan at any time. Changes take effect at the start of your next billing cycle. No penalties or fees for changing plans."},{q:"Do you offer discounts for non-profits?",a:"Yes! We offer special pricing for non-profit organizations and educational institutions. Please contact our sales team for more details."},{q:"What payment methods do you accept?",a:"We accept all major credit cards (Visa, Mastercard, American Express), PayPal, and wire transfers. Enterprise plans can also be invoiced."}]},{category:"Features & Product",faqs:[{q:"What features are included?",a:"HRFlow includes employee management, attendance tracking, leave management, payroll processing, recruitment, performance reviews, and comprehensive analytics. The specific features available depend on your plan."},{q:"Can I integrate HRFlow with other tools?",a:"Yes! HRFlow integrates with popular tools like Slack, Microsoft Teams, Google Workspace, QuickBooks, and more. Enterprise plans also support custom integrations via our API."},{q:"Is there a mobile app?",a:"We're developing native mobile apps for iOS and Android that will be available at launch. In the meantime, our web app is fully responsive and works great on mobile devices."},{q:"Can HRFlow handle payroll for my country?",a:"We currently support payroll processing for the US, UK, Canada, and Australia with more countries coming soon. Contact us to check if your country is supported."}]},{category:"Security & Privacy",faqs:[{q:"Is my data secure?",a:"Absolutely. We use enterprise-grade encryption (AES-256) for data at rest and TLS 1.3 for data in transit. We're SOC 2 Type II certified and regularly undergo third-party security audits."},{q:"Where is my data stored?",a:"Your data is stored in secure, SOC 2 certified data centers. We offer data residency options for EU, US, and Asia-Pacific regions to help you meet local compliance requirements."},{q:"Do you comply with GDPR?",a:"Yes, HRFlow is fully GDPR compliant. We provide tools for data export, deletion requests, and consent management. We also have a dedicated Data Protection Officer."},{q:"Can I export my data?",a:"Yes, you can export all your data at any time in standard formats (CSV, PDF, JSON). We believe your data belongs to you, and you should always have full access to it."}]},{category:"Support",faqs:[{q:"What kind of support do you offer?",a:"All plans include email support. Business plans get priority support with faster response times. Enterprise plans include 24/7 phone support and a dedicated account manager."},{q:"Do you offer training?",a:"Yes! We provide documentation, video tutorials, and webinars for all users. Enterprise plans include personalized training sessions and onboarding assistance."},{q:"What is your response time?",a:"We aim to respond to all inquiries within 2 hours during business hours. Priority support (Business plan)
